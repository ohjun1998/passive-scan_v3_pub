name: ⚡ GDrive Upload Quick Test (10s)

on:
  workflow_dispatch: # 수동 실행 버튼 생성

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

    # [우회 장치]: 스캔을 안 돌렸으니, 업로드 스크립트가 인식할 가짜 엑셀 파일을 가상머신 내에 뚝딱 만듭니다.
    - name: Create Dummy Report File
      run: |
        mkdir -p reports
        echo "This is a secure encryption test dummy data" > reports/passive_recon_report_v999.xlsx

    # [★검증할 수정 본문★]: 인라인 따옴표 깨짐이 해결되었는지 이 단계만 콕 집어 실행합니다.
    - name: Upload Final Excel Report to Google Drive
      env:
        GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        echo "$GDRIVE_SERVICE_ACCOUNT_JSON" > service_account.json
        python upload_to_gdrive.py
