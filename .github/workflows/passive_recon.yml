# [마스터 취합관]: 12대의 분산 데이터 복호화 후 엑셀 빌드 및 깃허브 보관함 사출
  excel-reporter:
    runs-on: ubuntu-latest
    needs: matrix-scan
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install openpyxl requests

    # 취합관 가상머신에서도 엑셀 구조 설계를 위해 마스터 타깃 목록 복원
    - name: Create Targets File from Secret
      run: |
        echo "${{ secrets.TARGET_DOMAINS }}" > targets.txt

    - name: Download All Encrypted Results
      uses: actions/download-artifact@v4
      with:
        path: encrypted_storage
        merge-multiple: true

    # 다운로드한 공개 아티팩트 자물쇠를 가상머신 메모리상에서만 안전하게 해제
    - name: Decrypt and Restore Results
      run: |
        mkdir -p results
        for f in encrypted_storage/*.gpg; do
          if [ -f "$f" ]; then
            echo "[+] Decrypting and extracting: $f"
            gpg --decrypt --batch --passphrase "${{ secrets.ACTIONS_CRYPTO_PASSWORD }}" "$f" 2>/dev/null | tar -xzf - -C results/
          fi
        done

    - name: Build Intelligent Excel Report
      run: python -u txt_to_excel.py

    # -----------------------------------------------------------------
    # [🔥 핵심 교체 1] 디코 첨부 대신 깃허브 자체 무제한 안전 보관소에 최종 엑셀 업로드
    # -----------------------------------------------------------------
    - name: Store Final Excel Report in GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: passive-recon-master-report # 다운로드 버튼에 표시될 이름
        path: reports/passive_recon_report_v1.xlsx # 생성된 마스터 엑셀 경로
        retention-days: 14 # 14일 동안 무료 보관 후 자동 파기 (클라우드 용량 관리)

    # -----------------------------------------------------------------
    # [🔥 핵심 교체 2] 디스코드로는 파일 없이 "원클릭 다운로드 바로가기 링크"만 사출
    # -----------------------------------------------------------------
    - name: Alert Discord with Direct Download Link
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d '{"content": "🚀 **[정찰 완료 - 통합 마스터 보고서]**\n🔒 데이터 중복 제거 및 65개 멀티 탭 엑셀 빌드가 성공적으로 완주되었습니다.\n\n📂 **안내사항:**\n용량이 무거워 파일 조각 분할 대신 깃허브 안전 보관소에 원본 파일을 저장했습니다. 조각 다운로드 및 병합 명령어 입력 없이 아래 링크에서 원클릭으로 마스터 엑셀을 바로 다운로드하세요!\n\n👇 **[보고서 다운로드 바로가기]**\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
             $DISCORD_WEBHOOK_URL
